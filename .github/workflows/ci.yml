name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (lint · typecheck · test · integration)
    runs-on: ubuntu-latest
    # Spin up Postgres and Mongo as job services so the integration suite
    # exercises the real cross-database transaction logic, not just mocks.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lef
          POSTGRES_PASSWORD: lef
          POSTGRES_DB: lef
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lef -d lef"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: lef
      PG_PASSWORD: lef
      PG_DATABASE: lef
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB: lef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Integration tests (real PG + Mongo)
        run: npm run test:integration

  client:
    name: Client (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
